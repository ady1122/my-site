<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="80%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#A65D2E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#A65D2E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="#171411"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Copper accent line -->
  <rect x="80" y="200" width="60" height="3" rx="1.5" fill="#A65D2E"/>
  <!-- Logo mark -->
  <g transform="translate(80, 80) scale(1.8)">
    <path d="M8 12 L22 50 L28 34" stroke="#F5F0EA" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M42 12 L28 50 L22 34" stroke="#A65D2E" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M25 28 L28 22 L31 28 L28 34 Z" fill="#A65D2E" opacity="0.85"/>
    <circle cx="25" cy="8" r="2.2" fill="#A65D2E"/>
    <line x1="25" y1="10.2" x2="25" y2="16" stroke="#A65D2E" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <!-- Headline -->
  <text x="80" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700" fill="#F5F0EA" letter-spacing="-1">We built companies</text>
  <text x="80" y="335" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700" fill="#F5F0EA" letter-spacing="-1">before we backed them.</text>
  <!-- Subline -->
  <text x="80" y="400" font-family="system-ui, sans-serif" font-size="24" fill="rgba(245,240,234,0.55)">Family office writing $100-200K cheques into early-stage tech.</text>
  <!-- Stats -->
  <text x="80" y="510" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#F5F0EA">$100-200K</text>
  <text x="80" y="540" font-family="system-ui, sans-serif" font-size="14" fill="rgba(245,240,234,0.4)" letter-spacing="1.5">CHEQUE SIZE</text>
  <text x="340" y="510" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#F5F0EA">60+</text>
  <text x="340" y="540" font-family="system-ui, sans-serif" font-size="14" fill="rgba(245,240,234,0.4)" letter-spacing="1.5">PORTFOLIO COMPANIES</text>
  <text x="600" y="510" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#F5F0EA">India + US</text>
  <text x="600" y="540" font-family="system-ui, sans-serif" font-size="14" fill="rgba(245,240,234,0.4)" letter-spacing="1.5">GEOGRAPHY</text>
  <!-- Domain -->
  <text x="1120" y="580" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#A65D2E" text-anchor="end">vcmint.com</text>
