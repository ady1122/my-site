<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <!--
    VCMint Logo V1 — Mark + Wordmark (Light / for dark backgrounds)
  -->
  <defs>
    <style>
      .wordmark { font-family: 'Georgia', 'Times New Roman', serif; font-weight: 700; }
    </style>
  </defs>

  <!-- Mark: Overlapping V shapes -->
  <g id="mark">
    <path d="M8 12 L22 50 L28 34" stroke="#F5F0EA" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M42 12 L28 50 L22 34" stroke="#C8784A" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M25 28 L28 22 L31 28 L28 34 Z" fill="#C8784A" opacity="0.85"/>
    <circle cx="25" cy="8" r="2.2" fill="#C8784A"/>
    <line x1="25" y1="10.2" x2="25" y2="16" stroke="#C8784A" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(58, 0)">
    <text x="0" y="44" class="wordmark" font-size="38" fill="#F5F0EA" letter-spacing="-1">VC</text>
    <text x="58" y="44" class="wordmark" font-size="38" fill="#C8784A" letter-spacing="-1">Mint</text>
  </g>

  <!-- Tagline -->
  <text x="58" y="58" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8.5" font-weight="500" fill="rgba(245,240,234,0.5)" letter-spacing="3.5">BACKING RESILIENT FOUNDERS</text>
</svg>
